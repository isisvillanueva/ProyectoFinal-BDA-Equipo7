<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>HospitalIoT — Acceso NFC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 24px 48px rgba(0,0,0,.5);
    }
    .brand {
      text-align: center;
      margin-bottom: 24px;
    }
    .brand strong {
      display: block;
      font-size: 18px;
      color: #38bdf8;
      margin-bottom: 2px;
    }
    .brand span { font-size: 12px; color: #475569; letter-spacing: .5px; }
    h1 {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .sub {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
      letter-spacing: .3px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 13px 14px;
      font-size: 15px;
      color: #e2e8f0;
      outline: none;
      margin-bottom: 14px;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    input:focus { border-color: #38bdf8; }
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      touch-action: manipulation;
      -webkit-appearance: none;
    }
    .btn:active { opacity: .85; }
    .err {
      margin-top: 14px;
      padding: 11px 13px;
      border-radius: 10px;
      font-size: 13px;
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <strong>HospitalIoT</strong>
    <span>Escáner de equipos</span>
  </div>

  <h1>Iniciar sesión</h1>
  <p class="sub">Accede para escanear equipos con NFC</p>

  <form method="POST" action="/nfc-login">
    <label for="username">Usuario</label>
    <input id="username" name="username" type="text"
           placeholder="medico01" autocomplete="username" required>

    <label for="password">Contraseña</label>
    <input id="password" name="password" type="password"
           placeholder="••••••••" autocomplete="current-password" required>

    <button class="btn" type="submit">Entrar →</button>
  </form>

  {% if error %}
    <div class="err">{{ error }}</div>
  {% endif %}
</div>
</body>
</html>

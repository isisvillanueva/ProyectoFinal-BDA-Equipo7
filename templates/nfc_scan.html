<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>HospitalIoT — Escanear NFC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 28px 22px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 24px 48px rgba(0,0,0,.5);
    }
    .brand {
      text-align: center;
      font-size: 12px;
      color: #475569;
      margin-bottom: 20px;
      letter-spacing: .5px;
    }
    .brand strong { color: #38bdf8; }
    h1 {
      text-align: center;
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .sub {
      text-align: center;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .user-bar {
      text-align: center;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 18px;
    }
    .user-bar strong { color: #cbd5e1; }

    /* Beacon status */
    .beacon-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0f172a;
      border-radius: 12px;
      padding: 13px 15px;
      margin-bottom: 20px;
      border: 1px solid #1e293b;
    }
    .beacon-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: #334155;
      flex-shrink: 0;
      transition: background .4s;
    }
    .beacon-dot.activo {
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,.25);
      animation: pulso 1.8s ease-in-out infinite;
    }
    @keyframes pulso {
      0%,100% { box-shadow: 0 0 0 3px rgba(34,197,94,.25); }
      50%      { box-shadow: 0 0 0 7px rgba(34,197,94,.08); }
    }
    .beacon-info { flex: 1; min-width: 0; }
    .beacon-info strong {
      display: block;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .beacon-info span {
      font-size: 11px;
      color: #64748b;
    }

    /* Botón principal */
    .btn-nfc {
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .3px;
      transition: opacity .15s, transform .1s;
      touch-action: manipulation;
    }
    .btn-nfc:active { transform: scale(.97); }
    .btn-nfc:disabled {
      background: #1e293b;
      color: #475569;
      cursor: not-allowed;
      transform: none;
    }

    /* Resultado */
    .result {
      display: none;
      margin-top: 16px;
      padding: 14px 15px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .result.show { display: block; }
    .result.ok {
      background: rgba(34,197,94,.12);
      border: 1px solid rgba(34,197,94,.3);
      color: #86efac;
    }
    .result.err {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5;
    }
    .result .equipo-nombre {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .result .detalle { color: inherit; opacity: .8; }

    .logout {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 12px;
      color: #334155;
      text-decoration: none;
    }
    .logout:hover { color: #64748b; }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">⬡ <strong>HospitalIoT</strong></div>

  <h1>Escanear equipo</h1>
  <p class="sub">Acerca el llavero NFC al celular<br>para registrar el equipo</p>

  <p class="user-bar">Sesión: <strong>{{ session.nombre_completo }}</strong></p>

  <div class="beacon-box">
    <div class="beacon-dot" id="bdot"></div>
    <div class="beacon-info">
      <strong id="bzona">Verificando ubicación…</strong>
      <span id="bdetalle">esperando señal del beacon</span>
    </div>
  </div>

  <button class="btn-nfc" id="btn" onclick="escanearNFC()" disabled>
    Escanear NFC
  </button>

  <div class="result" id="result">
    <div class="equipo-nombre" id="res-nombre"></div>
    <div class="detalle" id="res-detalle"></div>
  </div>

  <a href="{{ url_for('logout') }}" class="logout">Cerrar sesión</a>
</div>

<script>
let beaconActivo = false;

async function actualizarBeacon() {
  try {
    const r  = await fetch("/api/beacon/estado");
    const d  = await r.json();
    const dot = document.getElementById("bdot");
    const zon = document.getElementById("bzona");
    const det = document.getElementById("bdetalle");
    const btn = document.getElementById("btn");

    beaconActivo = d.activo;

    if (d.activo) {
      dot.className     = "beacon-dot activo";
      zon.textContent   = d.zona || "Zona activa";
      det.textContent   = `RSSI ${d.rssi ?? "--"} dBm · hace ${d.segundos_ago}s`;
      btn.disabled      = false;
      btn.textContent   = "Escanear NFC";
    } else {
      dot.className     = "beacon-dot";
      zon.textContent   = "Sin señal de beacon";
      det.textContent   = "Acércate al área para continuar";
      btn.disabled      = true;
      btn.textContent   = "Escanear NFC";
    }
  } catch (_) {
    document.getElementById("bzona").textContent = "Error al verificar beacon";
  }
}

async function escanearNFC() {
  if (!("NDEFReader" in window)) {
    mostrar(false, "NFC no disponible", "Usa Chrome en Android con NFC activado.");
    return;
  }
  const btn = document.getElementById("btn");
  btn.disabled    = true;
  btn.textContent = "Acerca el llavero…";

  try {
    const ndef = new NDEFReader();
    await ndef.scan();

    ndef.onreading = async (ev) => {
      ndef.onreading = null;
      const uid = ev.serialNumber.replace(/:/g, "").toUpperCase();
      btn.textContent = "Registrando…";
      await enviar(uid);
      btn.disabled    = false;
      btn.textContent = "Escanear NFC";
    };

    ndef.onerror = () => {
      mostrar(false, "Error de lectura", "Intenta de nuevo.");
      btn.disabled    = false;
      btn.textContent = "Escanear NFC";
    };
  } catch (e) {
    mostrar(false, "Permiso denegado", e.message);
    btn.disabled    = false;
    btn.textContent = "Escanear NFC";
  }
}

async function enviar(uid) {
  try {
    const r = await fetch("/api/nfc/movil", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ uid_nfc: uid }),
    });
    const d = await r.json();
    if (d.ok) {
      const eq  = d.equipo || {};
      const zon = d.zona ? ` · Zona: ${d.zona}` : "";
      mostrar(true,
        eq.nombre_equipo || "Equipo registrado",
        `Código: ${eq.codigo_interno || "—"}${zon}`
      );
    } else {
      mostrar(false, "No reconocido", d.mensaje);
    }
  } catch (e) {
    mostrar(false, "Error de red", e.message);
  }
}

function mostrar(ok, titulo, detalle) {
  const box = document.getElementById("result");
  box.className = "result show " + (ok ? "ok" : "err");
  document.getElementById("res-nombre").textContent  = titulo;
  document.getElementById("res-detalle").textContent = detalle;
}

actualizarBeacon();
setInterval(actualizarBeacon, 8000);
</script>
</body>
</html>
